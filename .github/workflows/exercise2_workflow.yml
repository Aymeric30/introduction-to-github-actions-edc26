name: Workflow of exercise 2
run-name: 2nd workflow # Optional

# Events triggering the workflow
on:
  push:
    branches:
      - main

# Group of jobs to run as part of the workflow
jobs:
  ubuntu_job:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Hello, I'm ubuntu-latest"
  macos_job:
    runs-on: macos-latest
    steps:
      - run: echo "Hello, I'm macos-latest"
  slow_job:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Hello, I'm slow_job"; sleep 120
  waiting_job:
    runs-on: ubuntu-latest
    needs: slow_job
    steps:
      - run: ls -l